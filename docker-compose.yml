name: dc-hub

services:
  local_db:
    image: timescale/timescaledb:latest-pg16
    container_name: hub_local_db
    env_file:
      - .env.local
    # Host port 5433 to avoid colliding with a local brew postgresql that
    # already listens on 5432. Inside the container Postgres stays on 5432.
    ports:
      - "5433:5432"
    volumes:
      - local_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # n8n removed from this compose file. On the company server a shared n8n
  # instance already runs at :5678 (managed separately). For local dev with
  # n8n, spin it up manually via `docker run` or a personal compose file.

volumes:
  local_db_data:
