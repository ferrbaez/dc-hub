name: willians-hub

services:
  local_db:
    image: timescale/timescaledb:latest-pg16
    container_name: hub_local_db
    environment:
      POSTGRES_USER: ${LOCAL_DB_USER:-ops}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD:?set LOCAL_DB_PASSWORD in .env.local}
      POSTGRES_DB: ${LOCAL_DB_NAME:-ops_console}
    ports:
      - "5432:5432"
    volumes:
      - local_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_DB_USER:-ops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: hub_n8n
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:?set N8N_PASSWORD in .env.local}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      GENERIC_TIMEZONE: America/Asuncion
      TZ: America/Asuncion
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  local_db_data:
  n8n_data:
