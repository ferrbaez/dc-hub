name: willians-hub

services:
  local_db:
    image: timescale/timescaledb:latest-pg16
    container_name: hub_local_db
    env_file:
      - .env.local
    # Host port 5433 to avoid colliding with a local brew postgresql that
    # already listens on 5432. Inside the container Postgres stays on 5432.
    ports:
      - "5433:5432"
    volumes:
      - local_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: hub_n8n
    env_file:
      - .env.local
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      GENERIC_TIMEZONE: America/Asuncion
      TZ: America/Asuncion
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  local_db_data:
  n8n_data:
